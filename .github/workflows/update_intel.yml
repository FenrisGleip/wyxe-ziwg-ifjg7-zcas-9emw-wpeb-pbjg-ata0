name: CIPHER Daily Intel Update

on:
  schedule:
    # 毎日 JST 06:00 (UTC 21:00) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:   # 手動実行も可能

permissions:
  contents: write      # コミット・プッシュに必要

jobs:
  update-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq

      - name: Run intel agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_articles.json articles.js index.html log.html log.js run_log.json
          git diff --staged --quiet || git commit -m "chore: update intel feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
